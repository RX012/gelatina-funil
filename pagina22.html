  <script>
  function goNext() {
    const params = new URLSearchParams(window.location.search);
    params.set("final_ab", "v2");
    const qs = params.toString();
    window.location.href = "pagina23-v2.html" + (qs ? `?${qs}` : "");

    // ? Progreso tipo “analizando” (agora ~12–13s, com pausas)
    (function runProgress(){
      const bar = document.getElementById("bar");
      const pctEl = document.getElementById("pct");
      const pb = document.querySelector(".progress");

      // Suma ~12.4s aprox (parece que está calculando)
      const steps = [
        {to: 5,  ms: 700},
        {to: 11, ms: 820},
        {to: 17, ms: 760},
        {to: 24, ms: 900},
        {to: 30, ms: 1100},  // pausa maior
        {to: 37, ms: 820},
        {to: 45, ms: 980},
        {to: 52, ms: 860},
        {to: 60, ms: 1200},  // pausa maior
        {to: 68, ms: 900},
        {to: 76, ms: 980},
        {to: 84, ms: 1050},
        {to: 92, ms: 1180},  // quase listo
        {to: 100, ms: 700}
      ];

      let i = 0;
      let current = 0;

      function setProgress(val){
        current = Math.max(0, Math.min(100, val));
        bar.style.width = current + "%";
        pctEl.textContent = String(current);
        pb.setAttribute("aria-valuenow", String(current));
      }

      function animateTo(target, duration){
        const start = current;
        const delta = target - start;
        const startTime = performance.now();

        function tick(now){
          const t = Math.min(1, (now - startTime) / duration);
          const eased = 1 - Math.pow(1 - t, 2);
          const value = Math.round(start + delta * eased);
          setProgress(value);
          if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function nextStep(){
        if (i >= steps.length) {
          setProgress(100);
          setTimeout(goNext, 420);
          return;
        }
        const s = steps[i++];
        const animMs = Math.max(260, Math.floor(s.ms * 0.62));
        const pauseMs = Math.max(0, s.ms - animMs);

        animateTo(s.to, animMs);
        setTimeout(nextStep, animMs + pauseMs);
      }

      setProgress(0);
      setTimeout(nextStep, 250);
    })();

    // Testimonios (3 cards, cada 3s)
    (function runTestimonials(){
      const data = [
        {
          name: "Mariana Gutiérrez",
          text: "Este protocolo con gelatina lo cambió todo para mí. En pocas semanas ya vi cómo mi abdomen desinflaba y la ropa volvió a quedarme."
        },
        {
          name: "Gabriela Torres",
          text: "El protocolo fue como un renacimiento para mí. Me siento más joven, más ligera y feliz con mi cuerpo."
        },
        {
          name: "Sofía Morales",
          text: "Es increíble cómo algo tan simple puede transformar tanto. Ya son 3 meses siguiéndolo y me siento otra persona."
        }
      ];

      const el = document.getElementById("testiCard");
      let idx = 0;

      function initials(n){
        return n.split(" ").slice(0,2).map(s => s[0].toUpperCase()).join("");
      }

      function render(item){
        el.innerHTML = `
          <div class="testi-head">
            <div class="avatar">${initials(item.name)}</div>
            <div>
              <p class="name mb-0">${item.name}</p>
              <div class="text-muted" style="font-weight:900; font-size:12px; opacity:.75;">
                Testimonio verificado
              </div>
            </div>
            <div class="stars" aria-label="5 estrellas">
              <i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i><i class="ri-star-fill"></i>
            </div>
          </div>
          <p class="quote">“${item.text}”</p>
        `;
      }

      function swap(){
        el.classList.remove("fade-enter");
        el.classList.add("fade-exit");

        setTimeout(() => {
          idx = (idx + 1) % data.length;
          render(data[idx]);
          el.classList.remove("fade-exit");
          el.classList.add("fade-enter");
        }, 220);
      }

      render(data[idx]);
      setInterval(swap, 3000);
    })();
  </script>
