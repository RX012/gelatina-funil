    <!-- Copia os parâmetros da URL atual para todos os links que vão para pagina8.html -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlAtual = new URL(window.location.href);
      const searchParams = urlAtual.searchParams;

      // Se não há parâmetros na URL, não faz nada
      if ([...searchParams].length === 0) return;

      // Seleciona todos os <a> que apontam para pagina4 (pagina8.html, pagina4.php, etc. se quiser)
      const linksPagina4 = document.querySelectorAll('a[href^="pagina4"]');
      if (!linksPagina4.length) return;

      linksPagina4.forEach(link => {
        const href = link.getAttribute('href');
        if (!href) return;

        // Cria uma URL baseada no href do link
        const linkUrl = new URL(href, window.location.href);

        // Copia cada parâmetro da URL atual para o link,
        // sem sobrescrever se o link já tiver esse parâmetro
        searchParams.forEach((value, key) => {
          if (!linkUrl.searchParams.has(key)) {
            linkUrl.searchParams.set(key, value);
          }
        });

        // Atualiza o href
        link.setAttribute('href', linkUrl.toString());
      });
    });
    </script>
