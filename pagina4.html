    <!-- Salva altura no localStorage antes de ir para a próxima página -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const btnContinuarAltura = document.querySelector('.btn-model.btn-model-enabled');

        if (!btnContinuarAltura) return;

        btnContinuarAltura.addEventListener('click', function (e) {
            e.preventDefault(); // impede o <a> de redirecionar na hora

            const heightValueEl  = document.getElementById('heightBigValue');
            const heightUnitEl   = document.getElementById('heightUnitLabel');

            if (!heightValueEl || !heightUnitEl) {
                console.warn('Elementos de altura não encontrados.');
                const fallbackLink = this.closest('a');
                const fallbackUrl  = fallbackLink ? fallbackLink.getAttribute('href') : 'pagina5.html';
                window.location.href = fallbackUrl;
                return;
            }

            const valor  = heightValueEl.textContent.trim();   // ex: "170"
            const unidad = heightUnitEl.textContent.trim();    // ex: "cm" ou "pol"

            // Salva separado
            localStorage.setItem('altura_valor', valor);
            localStorage.setItem('altura_unidad', unidad);

            // E também em um único campo como objeto
            const alturaObj = {
                valor: parseFloat(valor),
                unidad: unidad
            };
            localStorage.setItem('altura', JSON.stringify(alturaObj));

            console.log('Altura salva no localStorage:', alturaObj);

            // Redireciona para a próxima página
            const link    = this.closest('a');
            const destino = link ? link.getAttribute('href') : 'pagina5.html';
            window.location.href = destino;
        });
    });
    </script>

    <!-- Copia TODOS os parâmetros da URL atual para o link pagina5.html -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlAtual     = new URL(window.location.href);
        const searchParams = urlAtual.searchParams;

        // Se não tem parâmetros, não faz nada
        if ([...searchParams].length === 0) return;

        const linksPagina11 = document.querySelectorAll('a[href^="pagina5"]');
        if (!linksPagina11.length) return;

        linksPagina11.forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;

            const novaUrl = new URL(href, window.location.href);

            // Copia cada parâmetro da URL atual para a URL do link
            searchParams.forEach((value, key) => {
                if (!novaUrl.searchParams.has(key)) {
                    novaUrl.searchParams.set(key, value);
                }
            });

            link.setAttribute('href', novaUrl.toString());
        });
    });
    </script>
