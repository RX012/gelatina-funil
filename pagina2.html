  <!-- Copia parâmetros para pagina3 -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlAtual = new URL(window.location.href);
      const searchParams = urlAtual.searchParams;

      if ([...searchParams].length === 0) return;

      const linksPagina3 = document.querySelectorAll('a[href^="pagina3"]');
      if (!linksPagina3.length) return;

      linksPagina3.forEach(link => {
        const href = link.getAttribute('href');
        if (!href) return;

        const linkUrl = new URL(href, window.location.href);

        searchParams.forEach((value, key) => {
          if (!linkUrl.searchParams.has(key)) {
            linkUrl.searchParams.set(key, value);
          }
        });

        link.setAttribute('href', linkUrl.toString());
      });
    });
  </script>

  <!-- SALVA UTM_CAMPAIGN NO LOCALSTORAGE COMO sck -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      try {
        const url = new URL(window.location.href);
        const utm = url.searchParams.get("utm_campaign");

        if (utm && utm.trim() !== "") {
          localStorage.setItem("sck", utm);
        }
      } catch (e) {
        console.warn("Erro ao salvar utm_campaign no localStorage", e);
      }
    });
  </script>

  <!-- ✅ SALVA A FAIXA DE IDADE (somente range limpo) NO LOCALSTORAGE -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const buttons = document.querySelectorAll(".option-btn");

      buttons.forEach(btn => {
        btn.addEventListener("click", function (e) {
          // impede navegar antes de salvar
          e.preventDefault();

          // pega o range limpo direto do data-age
          const range = btn.getAttribute("data-age") || "";

          if (range) {
            localStorage.setItem("age_range", range); // ex: "18-29", "30-39", "50+"
          }

          // navega para o href do <a> pai (já com UTMs)
          const link = btn.closest("a");
          if (link && link.href) {
            window.location.href = link.href;
          }
        });
      });
    });
  </script>
