    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const optionButtons = document.querySelectorAll('.check-option-btn');
        const btnContinuar  = document.getElementById('btnContinuar');

        // Função para pegar todas as áreas selecionadas
        function getSelectedAreas() {
            const selecionadas = [];

            optionButtons.forEach(btn => {
                if (btn.classList.contains('selected')) {
                    const area = btn.dataset.area;
                    if (area) {
                        selecionadas.push(area);
                    }
                }
            });

            return selecionadas;
        }

        // Quando clicar em uma opção
        optionButtons.forEach(btn => {
            btn.addEventListener('click', function () {
                // Alterna a seleção visual
                this.classList.toggle('selected');

                // Opcional: marcar visual do check
                const checkMark = this.querySelector('.check-mark');
                if (checkMark) {
                    checkMark.classList.toggle('check-mark-active');
                }

                // Verifica quantas áreas estão selecionadas
                const selecionadas = getSelectedAreas();

                if (selecionadas.length > 0) {
                    btnContinuar.disabled = false;
                    btnContinuar.classList.remove('btn-model-disabled');
                    btnContinuar.textContent = 'Continuar';
                } else {
                    btnContinuar.disabled = true;
                    btnContinuar.classList.add('btn-model-disabled');
                    btnContinuar.textContent = 'Selecciona alguna área arriba';
                }
            });
        });

        // Quando clicar em Continuar
        btnContinuar.addEventListener('click', function () {
            const selecionadas = getSelectedAreas();

            // Salvando em UM ÚNICO CAMPO no localStorage como array
            localStorage.setItem('beneficios_deseados', JSON.stringify(selecionadas));
            console.log('Beneficios salvos no localStorage:', selecionadas);

            // 🔹 Agora montamos a URL da próxima página preservando os parâmetros atuais
            const urlAtual   = new URL(window.location.href);
            const searchOrig = urlAtual.searchParams;

            // Troque aqui se o nome da próxima página for outro
            const proximaUrl = new URL('pagina14.html', window.location.href);

            // Copia cada parâmetro da URL atual para a próxima página,
            // sem sobrescrever se já existir
            searchOrig.forEach((value, key) => {
                if (!proximaUrl.searchParams.has(key)) {
                    proximaUrl.searchParams.set(key, value);
                }
            });

            // Redireciona para a próxima página com os parâmetros preservados
            window.location.href = proximaUrl.toString();
        });
    });
    </script>
