    <!-- Salva peso atual no localStorage antes de ir para a próxima página -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const btnContinuar = document.querySelector('.btn-model.btn-model-enabled');

        if (!btnContinuar) return;

        btnContinuar.addEventListener('click', function (e) {
            e.preventDefault(); // evita o redirecionamento imediato do <a>

            const bigValueEl  = document.getElementById('bigValue');
            const unitLabelEl = document.getElementById('unitLabel');

            if (!bigValueEl || !unitLabelEl) {
                console.warn('Elementos de peso não encontrados.');
                const fallbackLink = this.closest('a');
                const fallbackUrl  = fallbackLink ? fallbackLink.getAttribute('href') : 'pagina16.html';
                window.location.href = fallbackUrl;
                return;
            }

            const valor  = bigValueEl.textContent.trim();   // ex: "70"
            const unidad = unitLabelEl.textContent.trim();  // ex: "kg" ou "lb"

            // Salva separado
            localStorage.setItem('objetivo_peso_valor', valor);
            localStorage.setItem('objetivo_peso_unidad', unidad);

            // E também em um único campo como objeto
            const pesoObj = {
                valor: parseFloat(valor),
                unidad: unidad
            };
            localStorage.setItem('objetivo_peso', JSON.stringify(pesoObj));

            console.log('Peso salvo no localStorage:', pesoObj);

            // Redireciona para a próxima página
            const link = this.closest('a');
            const destino = link ? link.getAttribute('href') : 'pagina16.html';
            window.location.href = destino;
        });
    });
    </script>

    <!-- Copia TODOS os parâmetros da URL atual para o link pagina16.html -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlAtual = new URL(window.location.href);
        const searchParams = urlAtual.searchParams;

        // Se não tem parâmetros, não faz nada
        if ([...searchParams].length === 0) return;

        const linksPagina10 = document.querySelectorAll('a[href^="pagina16"]');
        if (!linksPagina10.length) return;

        linksPagina10.forEach(link => {
            const href = link.getAttribute('href');
            if (!href) return;

            const novaUrl = new URL(href, window.location.href);

            // Copia cada parâmetro da URL atual para a URL do link
            searchParams.forEach((value, key) => {
                if (!novaUrl.searchParams.has(key)) {
                    novaUrl.searchParams.set(key, value);
                }
            });

            link.setAttribute('href', novaUrl.toString());
        });
    });
    </script>
