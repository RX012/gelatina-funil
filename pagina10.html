        <script>
        document.addEventListener('DOMContentLoaded', function () {
         
          // 🔹 Copiar parâmetros da URL atual para todos os links que vão para pagina11.html
          const urlAtual = new URL(window.location.href);
          const searchParams = urlAtual.searchParams;

          if ([...searchParams].length > 0) {
            const linksPagina6 = document.querySelectorAll('a[href^="pagina11"]');
            linksPagina6.forEach(link => {
              const href = link.getAttribute('href');
              if (!href) return;

              const linkUrl = new URL(href, window.location.href);

              // Copia cada parâmetro da URL atual para o link
              searchParams.forEach((value, key) => {
                if (!linkUrl.searchParams.has(key)) {
                  linkUrl.searchParams.set(key, value);
                }
              });

              link.setAttribute('href', linkUrl.toString());
            });
          }
        });

        <script>
(() => {
  const NEXT_PAGE = 'pagina11.html'; // <- próxima página do funil

  function abs(url) {
    return new URL(url, location.href).href;
  }

  function addLink(rel, href, as) {
    const full = abs(href);
    if (document.querySelector(`link[rel="${rel}"][href="${full}"]`)) return;
    const l = document.createElement('link');
    l.rel = rel;
    l.href = full;
    if (as) l.as = as;
    document.head.appendChild(l);
  }

  async function warmNextPage() {
    try {
      const nextUrl = abs(NEXT_PAGE);

      // 1) dicas ao navegador
      addLink('dns-prefetch', location.origin);
      addLink('preconnect', location.origin);
      addLink('prefetch', nextUrl, 'document');
      addLink('prerender', nextUrl); // browsers que suportam

      // 2) baixa o HTML da próxima página
      const res = await fetch(nextUrl);
      const html = await res.text();

      // 3) parseia recursos e faz preload/prefetch agressivo
      const doc = new DOMParser().parseFromString(html, 'text/html');

      const resources = new Set();

      // CSS
      doc.querySelectorAll('link[rel="stylesheet"][href], link[rel="preload"][href], link[rel="modulepreload"][href]')
        .forEach(el => resources.add(el.getAttribute('href')));

      // JS
      doc.querySelectorAll('script[src]').forEach(el => resources.add(el.getAttribute('src')));

      // Imagens comuns
      doc.querySelectorAll('img[src], source[srcset], img[srcset]')
        .forEach(el => {
          const src = el.getAttribute('src');
          if (src) resources.add(src);

          const srcset = el.getAttribute('srcset');
          if (srcset) {
            srcset.split(',').forEach(part => {
              const u = part.trim().split(/\s+/)[0];
              if (u) resources.add(u);
            });
          }
        });

      // Fontes declaradas no HTML
      doc.querySelectorAll('link[href*=".woff"], link[href*=".woff2"], link[href*=".ttf"], link[href*=".otf"]')
        .forEach(el => resources.add(el.getAttribute('href')));

      // 4) injeta hints + fetch de aquecimento
      for (const r of resources) {
        if (!r) continue;
        const full = abs(r);

        const lower = full.toLowerCase();
        if (lower.endsWith('.css')) {
          addLink('preload', full, 'style');
        } else if (lower.endsWith('.js') || lower.includes('.js?')) {
          addLink('modulepreload', full);
          addLink('preload', full, 'script');
        } else if (/\.(png|jpe?g|webp|gif|svg|avif)(\?|#|$)/i.test(lower)) {
          addLink('preload', full, 'image');
        } else if (/\.(woff2?|ttf|otf)(\?|#|$)/i.test(lower)) {
          addLink('preload', full, 'font');
        } else {
          addLink('prefetch', full);
        }

        // aquece só recursos do mesmo domínio para evitar ruído de CORS
        if (new URL(full).origin === location.origin) {
          fetch(full).catch(() => {});
        }
      }
    } catch (e) {
      // fallback mínimo
      fetch(abs(NEXT_PAGE)).catch(() => {});
    }
  }

  // só começa depois que a página atual terminou de carregar
  window.addEventListener('load', () => {
    warmNextPage();
  });
})();
</script>
