  <!-- ✅ Salva a resposta no localStorage e direciona para pagina12 preservando parâmetros -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const buttons = document.querySelectorAll('.option-btn[data-azucar]');

      buttons.forEach(btn => {
        btn.addEventListener('click', function (e) {
          e.preventDefault(); // impede o <a> de redirecionar antes de salvar

          const escolha = btn.getAttribute('data-azucar') || '';

          // salva em UM campo
          localStorage.setItem('restricao_acucar', escolha);
          console.log('restricao_acucar salvo:', escolha);

          // destino base (href do <a>)
          const link = btn.closest('a');
          const destinoHref = link ? link.getAttribute('href') : 'pagina12.html';

          // preserva os parâmetros (UTMs etc.)
          const urlAtual = new URL(window.location.href);
          const paramsOrig = urlAtual.searchParams;

          const proximaUrl = new URL(destinoHref, window.location.href);

          paramsOrig.forEach((value, key) => {
            if (!proximaUrl.searchParams.has(key)) {
              proximaUrl.searchParams.set(key, value);
            }
          });

          window.location.href = proximaUrl.toString();
        });
      });
    });
  </script>
