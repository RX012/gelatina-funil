    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const motivoButtons = document.querySelectorAll('.option-btn[data-motivo]');

        motivoButtons.forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault(); // impede o <a> de redirecionar imediatamente

                const motivo = this.dataset.motivo;

                // 🔹 1) Salva o motivo escolhido em UM campo só
                localStorage.setItem('motivo_principal', motivo);
                console.log('Motivo principal salvo:', motivo);

                // 🔹 2) Descobre o link de destino (normalmente pagina11-1.html)
                const link = this.closest('a');
                const destinoHref = link ? link.getAttribute('href') : 'pagina11-1.html';

                // 🔹 3) Monta a URL da próxima página, preservando parâmetros
                const urlAtual   = new URL(window.location.href);
                const paramsOrig = urlAtual.searchParams;

                const proximaUrl = new URL(destinoHref, window.location.href);

                // Copia cada parâmetro da URL atual pra próxima
                paramsOrig.forEach((value, key) => {
                    if (!proximaUrl.searchParams.has(key)) {
                        proximaUrl.searchParams.set(key, value);
                    }
                });

                // 🔹 4) Redireciona com os parâmetros preservados
                window.location.href = proximaUrl.toString();
            });
        });
    });
    </script>
