    <script>
    document.addEventListener('DOMContentLoaded', function () {
     
      /* =========================
         FORM NOMBRE + REDIRECT
      ========================== */
      const form = document.getElementById('form-nombre');
      const inputNombre = document.getElementById('nombre');

      if (form && inputNombre) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();

          // Usa HTML5 validation + required
          if (!form.checkValidity()) {
            form.reportValidity();
            return;
          }

          const valor = (inputNombre.value || '').trim();
          if (!valor) {
            form.reportValidity();
            return;
          }

          // Salva nome em localStorage (várias chaves pra reaproveitar no funil)
          try {
            localStorage.setItem('nome', valor);
            localStorage.setItem('nombre', valor);
            localStorage.setItem('nome_usuario', valor);
          } catch (err) {
            // se der erro de storage, só segue
          }

          // Monta URL da próxima página mantendo TODOS os parâmetros
          const urlAtual = new URL(window.location.href);
          const paramsOriginais = urlAtual.searchParams;

          const destino = new URL('pagina9.html', window.location.href);
          paramsOriginais.forEach((v, k) => {
            destino.searchParams.set(k, v);
          });

          window.location.href = destino.toString();
        });
      }
    });
    </script>
