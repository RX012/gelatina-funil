  <!-- ✅ Copia os parâmetros da URL atual para todos os links de pagina22.html -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlAtual = new URL(window.location.href);
      const searchParams = urlAtual.searchParams;
      if ([...searchParams].length === 0) return;

      const linksPagina22 = document.querySelectorAll('a[href^="pagina22"]');
      if (!linksPagina22.length) return;

      linksPagina22.forEach(link => {
        const href = link.getAttribute('href');
        if (!href) return;

        const linkUrl = new URL(href, window.location.href);

        searchParams.forEach((value, key) => {
          if (!linkUrl.searchParams.has(key)) {
            linkUrl.searchParams.set(key, value);
          }
        });

        link.setAttribute('href', linkUrl.toString());
      });
    });
  </script>

  <!-- ✅ Tracking + envio do ge/genero -->
  <script>
    (async () => {
      const ls = localStorage;

      const toNull = (v) => {
        if (v === null || v === undefined) return null;
        const s = String(v).trim();
        return s === '' || s === 'null' || s === 'undefined' ? null : s;
      };

      const get = (key) => toNull(ls.getItem(key));

      const parseJsonSafe = (v) => {
        const s = toNull(v);
        if (!s) return null;
        try { return JSON.parse(s); } catch { return null; }
      };

      const normalizeEmail = (v) => {
        const s = toNull(v);
        return s ? s.toLowerCase() : null;
      };

      const normalizePhone = (v) => {
        const s = toNull(v);
        if (!s) return null;
        const hasPlus = s.trim().startsWith('+');
        const digits = s.replace(/[^\d]/g, '');
        if (!digits) return null;
        return hasPlus ? `+${digits}` : digits;
      };

      const salrosaExtraRaw = get('salrosa_extra_sent_v5');
      const salrosaExtraObj = parseJsonSafe(salrosaExtraRaw) || {};

      const email = normalizeEmail(get('email') ?? salrosaExtraObj.email ?? null);

      const phone = normalizePhone(
        get('phone') ??
        get('telefone') ??
        get('celular') ??
        salrosaExtraObj.phone ??
        salrosaExtraObj.telefone ??
        salrosaExtraObj.celular ??
        null
      );

      const whatsapp = normalizePhone(
        get('whatsapp') ??
        get('wa') ??
        salrosaExtraObj.whatsapp ??
        salrosaExtraObj.wa ??
        null
      );

      // ✅ PEGA O GÊNERO
      const ge = get('ge'); // "m" ou "f"

      const cookies = Object.fromEntries(
        document.cookie
          .split('; ')
          .filter(Boolean)
          .map((c) => {
            const i = c.indexOf('=');
            const k = i > -1 ? decodeURIComponent(c.slice(0, i)) : c;
            const v = i > -1 ? decodeURIComponent(c.slice(i + 1)) : '';
            return [k, v];
          })
      );

      const payload = {
        external_id: get('external_id'),
        age_range: get('age_range'),
        altura: get('altura'),
        altura_unidad: get('altura_unidad'),
        altura_valor: get('altura_valor'),
        areas_perder_grasa: get('areas_perder_grasa'),
        capi_events_fired: get('capi_events_fired'),

        gelatina_capi_event_id_AddToCart: get('gelatina_capi_event_id_AddToCart'),
        gelatina_capi_event_id_Lead: get('gelatina_capi_event_id_Lead'),
        gelatina_capi_event_id_PageView: get('gelatina_capi_event_id_PageView'),
        gelatina_capi_external_id: get('gelatina_capi_external_id'),
        gelatina_capi_geo_cache: get('gelatina_capi_geo_cache'),
        gelatina_capi_sent_AddToCart: get('gelatina_capi_sent_AddToCart'),
        gelatina_capi_sent_Lead: get('gelatina_capi_sent_Lead'),
        gelatina_capi_sent_PageView: get('gelatina_capi_sent_PageView'),

        horario_protocolo: get('horario_protocolo'),
        lastExternalReferrer: get('lastExternalReferrer'),
        lastExternalReferrerTime: get('lastExternalReferrerTime'),
        last_active_at: get('last_active_at'),
        motivo_principal: get('motivo_principal'),

        nome: get('nome'),
        nome_usuario: get('nome_usuario'),

        email,
        phone,
        whatsapp,

        // ✅ ENVIA O GÊNERO (os dois nomes)
        ge,
        genero: ge,

        peso_actual: get('peso_actual'),
        peso_actual_unidad: get('peso_actual_unidad'),
        peso_actual_valor: get('peso_actual_valor'),

        restricao_acucar: get('restricao_acucar'),
        salrosa_extra_sent_v5: salrosaExtraRaw,
        salrosa_ultima_pagina: get('salrosa_ultima_pagina'),
        salrosa_ultima_pagina_num: get('salrosa_ultima_pagina_num'),

        session_token: get('session_token'),
        topicsLastReferenceTime: get('topicsLastReferenceTime'),
        visit_token: get('visit_token'),

        "smartautoplay-6967f55e521058214cab5a41": get('smartautoplay-6967f55e521058214cab5a41'),
        "smartautoplay-697d3538581cbdf66a72a691": get('smartautoplay-697d3538581cbdf66a72a691'),
        "smartautoplay-6985e811c5474ee68037b6e6": get('smartautoplay-6985e811c5474ee68037b6e6'),
        "smartautoplay-6985e83b0ad74b94a245274c": get('smartautoplay-6985e83b0ad74b94a245274c'),

        cookies
      };

      if (!payload.external_id) {
        console.warn('[tracking] external_id ausente, envio cancelado');
        return;
      }

      const res = await fetch('salvar_tracking.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        keepalive: true
      });

      const out = await res.json().catch(() => ({}));
      console.log('[tracking] status:', res.status, 'saved:', out?.saved, out);
    })();
  </script>
