    <!-- Copia TODOS os parâmetros da URL atual para os links pagina18.html -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlAtual     = new URL(window.location.href);
      const searchParams = urlAtual.searchParams;

      // Se não tem parâmetros, não faz nada
      if ([...searchParams].length === 0) return;

      const linksPagina13 = document.querySelectorAll('a[href^="pagina18"]');
      if (!linksPagina13.length) return;

      linksPagina13.forEach(link => {
        const href = link.getAttribute('href');
        if (!href) return;

        const novaUrl = new URL(href, window.location.href);

        // Copia cada parâmetro da URL atual para a URL do link
        searchParams.forEach((value, key) => {
          if (!novaUrl.searchParams.has(key)) {
            novaUrl.searchParams.set(key, value);
          }
        });

        link.setAttribute('href', novaUrl.toString());
      });
    });
    </script>
