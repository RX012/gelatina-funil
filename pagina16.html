    <!-- SALVAR NO LOCALSTORAGE -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const horarioBtns = document.querySelectorAll('.option-btn[data-resp]');

        horarioBtns.forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();

                const horario = this.dataset.resp;
                localStorage.setItem('horario_protocolo', horario);

                const link = this.closest('a');
                const destino = link ? link.getAttribute('href') : 'pagina17.html';
                window.location.href = destino;
            });
        });
    });
    </script>

    <!-- COPIAR PARÂMETROS DA URL PARA TODOS OS LINKS pagina17.html -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlAtual = new URL(window.location.href);
        const searchParams = urlAtual.searchParams;

        if (![...searchParams].length) return;

        const links = document.querySelectorAll('a[href^="pagina17"]');

        links.forEach(link => {
            const href = link.getAttribute('href');
            const novaUrl = new URL(href, window.location.href);

            searchParams.forEach((value, key) => {
                if (!novaUrl.searchParams.has(key)) {
                    novaUrl.searchParams.set(key, value);
                }
            });

            link.setAttribute('href', novaUrl.toString());
        });
    });
    </script>
